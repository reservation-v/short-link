services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shortener"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:4
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "-path=/migrations"
      - "-database=postgres://postgres:postgres@postgres:5432/shortener?sslmode=disable"
      - "up"
    restart: "no"
    volumes:
      - ./migrations:/migrations:ro

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - "--storage=postgres"
      - "--postgres-dsn=postgres://postgres:postgres@postgres:5432/shortener?sslmode=disable"
      - "--http-addr=:8081"
    ports:
      - "8081:8081"

volumes:
  postgres_data:
